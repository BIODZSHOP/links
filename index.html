<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BIODZSHOP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Montserrat:wght@400;600;700;800;900&display=swap');

:root {
  --green-deep:  #0a2e0a;
  --green-dark:  #1a5c1a;
  --green-mid:   #2d7a2d;
  --green-light: #4a9e4a;
  --green-pale:  #e8f5e8;
  --gold:        #c9a84c;
  --gold-light:  #e8c97a;
  --white:       #ffffff;
  --off-white:   #f7faf7;
  --text:        #0f2010;
  --sub:         #5a7a5a;
  --border:      #d4e8d4;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--off-white);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  position: fixed;
  inset: 0;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(45,122,45,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(15,61,15,0.08) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232d7a2d' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* ══ LAYOUT: full height flex ══ */
.page {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}

/* ══ HERO — compact fixed ══ */
.hero {
  flex-shrink: 0;
  padding: 20px 20px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.hero-bg {
  position: absolute; inset: 0;
  background: linear-gradient(175deg, var(--green-deep) 0%, #0d3b0d 40%, #16511a 75%, #1e6b20 100%);
  z-index: 0;
}

.hero-bg::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 80% 20%, rgba(201,168,76,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 15% 75%, rgba(74,158,74,0.22) 0%, transparent 55%);
}

.hero-wave {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 36px; z-index: 1; overflow: hidden;
}
.hero-wave svg { display:block; width:100%; height:100%; }

.hero-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
}
.hero-ring-1 { width:200px; height:200px; top:-60px; right:-60px; }
.hero-ring-2 { width:140px; height:140px; top:10px; left:-50px; }
.hero-ring-3 { width:90px;  height:90px;  bottom:30px; right:10px; }

/* logo */
.logo-wrap {
  width: 92px; height: 92px;
  border-radius: 20px;
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(255,255,255,1), 0 0 0 6px rgba(255,255,255,0.15), 0 14px 36px rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
  margin-top: 16px;
  position: relative; z-index: 2;
  animation: logoIn .9s cubic-bezier(.16,1,.3,1) .1s both;
}
.logo-wrap img {
  width: 100%; height: 100%;
  border-radius: 17px;
  object-fit: cover;
}

.brand-name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--white);
  text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  margin-bottom: 5px;
  margin-top: 5px;
  position: relative; z-index: 2;
  animation: fadeUp .7s cubic-bezier(.16,1,.3,1) .2s both;
}

.brand-tagline {
  font-size: 10px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 3px;
  font-weight: 300;
  margin-bottom: 10px;
  position: relative; z-index: 2;
  animation: fadeUp .7s cubic-bezier(.16,1,.3,1) .3s both;
}

.hero-content-pad { padding-bottom: 10px; }

/* ══ LINKS AREA ══ */
.links-area {
  flex: 1;
  padding: 20px 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  min-height: 0;
}

.link-card {
  flex: 1;
  display: flex; align-items: center; gap: 12px;
  padding: 0 14px;
  background: var(--white);
  border-radius: 14px;
  text-decoration: none; color: var(--text);
  box-shadow: 0 2px 8px rgba(15,61,15,0.06);
  border: 1.5px solid var(--border);
  transition: transform .22s, box-shadow .22s, border-color .22s;
  opacity: 0;
  animation: fadeUp .6s cubic-bezier(.16,1,.3,1) forwards;
  min-height: 0;
}

.link-card:active { transform: scale(.97); }
.link-card:hover {
  transform: translateX(-3px);
  box-shadow: 0 6px 22px rgba(15,61,15,0.14);
  border-color: var(--green-light);
}

.lc-icon {
  width: 48px; height: 48px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.lc-icon svg { width: 30px; height: 30px; }
.fb-bg  { background: #E8F0FE; }
.ig-bg  { background: #FDE8F0; }
.tt-bg  { background: #F0F0F0; }
.wa-bg  { background: #E6F9ED; }
.web-bg { background: #fdf3d8; }
.grev-bg{ background: #f1f3f4; }

.lc-text { flex: 1; }
.lc-name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800; font-size: 12px;
  letter-spacing: .5px; color: var(--text); margin-bottom: 5px;
}
.lc-desc { font-size: 10.5px; color: var(--sub); }

.lc-arrow { font-size: 16px; color: #c4cdc4; transition: color .2s, transform .2s; }
.link-card:hover .lc-arrow { color: var(--green-dark); transform: translateX(-3px); }

.lc-stars { display:flex; gap:2px; margin-top:2px; }
.lc-stars span { font-size: 10px; color: #FBBC04; }

.d1 { animation-delay:.45s; }
.d2 { animation-delay:.52s; }
.d3 { animation-delay:.59s; }
.d4 { animation-delay:.66s; }
.d5 { animation-delay:.73s; }
.d6 { animation-delay:.80s; }

/* ══ FOOTER ══ */
footer {
  flex-shrink: 0;
  padding: 6px 16px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  animation: fadeUp .7s cubic-bezier(.16,1,.3,1) 1s both;
}

.nfc-pill {
  display: flex; align-items: center; gap: 7px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 50px; padding: 5px 14px;
  font-family: 'Montserrat', sans-serif;
  font-size: 9px; font-weight: 800;
  letter-spacing: 2px; color: var(--sub);
  text-transform: uppercase;
  box-shadow: 0 2px 8px rgba(15,61,15,0.06);
}
.nfc-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green-mid);
  animation: pulse 2s ease-in-out infinite;
}
.footer-copy { font-size: 10px; color: #a0b8a0; letter-spacing: 1px; }

/* ══ ANIMATIONS ══ */
@keyframes logoIn {
  from { opacity:0; transform:translateY(-16px) scale(.8); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse {
  0%,100% { transform:scale(1);   opacity:1; }
  50%      { transform:scale(.65); opacity:.5; }
}

/* ══ SAFE AREA (notch/home bar) ══ */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  footer { padding-bottom: max(10px, env(safe-area-inset-bottom)); }
}
</style>
</head>
